<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bold Ideations LLC - Card Preview</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0f0f0f; color: #f0f0f0; font-family: Georgia, sans-serif; padding: 40px; }
        h1 { font-size: 18px; color: #888; margin-bottom: 40px; }
        .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
        .option { background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 12px; overflow: hidden; }
        .img-box { height: 300px; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .img-box img { width: 100%; height: 100%; object-fit: contain; }
        .label { padding: 16px 20px; border-top: 1px solid #2a2a2a; }
        .label p { font-size: 15px; font-weight: bold; color: #f0f0f0; margin-bottom: 4px; }
        .label span { font-size: 13px; color: #666; }
    </style>
</head>
<body>
    <h1>Card angle preview — pick your favourite</h1>
    <div class="row">
        <div class="option">
            <div class="img-box">
                <img src="card.png" alt="Flat" style="transform: none;">
            </div>
            <div class="label">
                <p>Option 1 — Flat</p>
                <span>No tilt, straight on</span>
            </div>
        </div>
        <div class="option">
            <div class="img-box">
                <img src="card.png" alt="Current" style="transform: perspective(800px) rotateY(6deg) rotateX(3deg);">
            </div>
            <div class="label">
                <p>Option 2 — Subtle tilt</p>
                <span>Current live version</span>
            </div>
        </div>
        <div class="option">
            <div class="img-box">
                <img src="card.png" alt="Dramatic" style="transform: perspective(800px) rotateY(18deg) rotateX(8deg);">
            </div>
            <div class="label">
                <p>Option 3 — Dramatic</p>
                <span>Strong 3D perspective</span>
            </div>
        </div>
    </div>
</body>
</html>
